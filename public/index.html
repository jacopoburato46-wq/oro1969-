<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burato Gioielli</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>

  <style>
    body { font-family: Arial; padding: 30px; background:#f5f5f5; }
    .box { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
    .hidden { display:none; }
    input { padding:10px; margin:5px; }
    button { padding:10px 20px; cursor:pointer; }
  </style>
</head>

<body>

<h1>Burato Gioielli</h1>

<div id="loginBox" class="box">
  <h3>Login</h3>
  <input id="email" placeholder="email" />
  <input id="password" type="password" placeholder="password" />
  <button onclick="login()">Accedi</button>
  <div id="loginStatus"></div>
</div>

<div id="appBox" class="box hidden">
  <h3 id="userInfo">Utente</h3>

  <input id="operator" placeholder="Operatore" />
  <input id="grams" type="number" placeholder="Grammi" />
  <button onclick="addEntry()">Aggiungi</button>

  <h3 id="total">Totale: 0 g</h3>

  <button onclick="resetAll()">Reset</button>
  <button onclick="logout()">Logout</button>

  <div id="list"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  window.BURATO_CONFIG.supabaseUrl,
  window.BURATO_CONFIG.supabaseAnonKey
);

let currentUser = null;
let storeName = null;

async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    document.getElementById('loginStatus').innerText = error.message;
    return;
  }

  currentUser = data.user;

  const { data: store } = await supabase
    .from('store_users')
    .select('*')
    .eq('user_id', currentUser.id)
    .single();

  storeName = store.store_name;

  document.getElementById('userInfo').innerText = storeName;
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('appBox').classList.remove('hidden');

  loadData();
}

async function addEntry(){
  const grams = parseFloat(document.getElementById('grams').value);
  const operator = document.getElementById('operator').value;

  await supabase.from('gold_entries').insert([
    {
      store: storeName,
      grams,
      operator_name: operator
    }
  ]);

  document.getElementById('grams').value = '';
  loadData();
}

async function loadData(){
  const { data } = await supabase.from('gold_entries').select('*');

  let total = 0;
  let html = '';

  data.forEach(r => {
    total += Number(r.grams);
    html += `<div>${r.store} - ${r.operator_name} - ${r.grams}g</div>`;
  });

  document.getElementById('total').innerText = "Totale: " + total + " g";
  document.getElementById('list').innerHTML = html;
}

async function resetAll(){
  await supabase.from('gold_entries').delete().neq('id',0);
  loadData();
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
