<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Login Burato</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 30px; background: #f5f5f5; }
    .box { background: white; padding: 20px; border-radius: 10px; max-width: 700px; }
    input, button { padding: 10px; margin: 8px 8px 8px 0; font-size: 16px; }
    #status { margin-top: 12px; color: #b00020; font-weight: 700; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Test Login Burato</h1>

    <div>
      <input id="email" type="email" placeholder="email" />
      <input id="password" type="password" placeholder="password" />
      <button id="loginBtn" type="button">Accedi</button>
    </div>

    <div id="status">Pagina caricata.</div>
  </div>

<script>
(function () {
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('loginBtn');

  function setStatus(text) {
    statusEl.innerText = text;
  }

  setStatus('Script partito.');

  if (!window.BURATO_CONFIG) {
    setStatus('ERRORE: window.BURATO_CONFIG non esiste');
    return;
  }

  if (!window.BURATO_CONFIG.supabaseUrl || !window.BURATO_CONFIG.supabaseAnonKey) {
    setStatus('ERRORE: config.js presente ma incompleto');
    return;
  }

  if (!window.supabase || !window.supabase.createClient) {
    setStatus('ERRORE: libreria Supabase non caricata');
    return;
  }

  const client = window.supabase.createClient(
    window.BURATO_CONFIG.supabaseUrl,
    window.BURATO_CONFIG.supabaseAnonKey
  );

  setStatus('Client Supabase creato correttamente.');

  btn.addEventListener('click', async function () {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    setStatus('Click ricevuto. Tentativo login...');

    try {
      const { data, error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setStatus('ERRORE AUTH: ' + error.message);
        return;
      }

      if (!data || !data.user) {
        setStatus('ERRORE AUTH: login senza utente');
        return;
      }

      setStatus('LOGIN OK: ' + data.user.email);
    } catch (e) {
      setStatus('ERRORE JS: ' + e.message);
    }
  });
})();
</script>
</body>
</html>
